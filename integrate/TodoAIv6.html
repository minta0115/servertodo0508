<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5, viewport-fit=cover">
  <title>TodoAI v6 · 全功能待办管家</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#f0f2f5;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',system-ui;display:flex;justify-content:center;align-items:center;min-height:100vh}
    .app{width:100%;max-width:600px;height:100vh;max-height:900px;background:white;display:flex;flex-direction:column;box-shadow:0 0 30px rgba(0,0,0,0.05);position:relative}
    .header{background:white;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0f0f0}
    .header h1{font-size:20px;font-weight:700;color:#1e293b}
    .header .date{color:#64748b;font-size:14px}
    .main-content{flex:1;overflow-y:auto;padding:16px;background:#f9fafb}
    .tab-bar{display:flex;background:white;border-top:1px solid #e9ecf2;padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
    .tab-item{flex:1;text-align:center;font-size:13px;color:#94a3b8;padding:6px 4px;cursor:pointer;border-radius:12px;margin:0 4px;transition:0.2s}
    .tab-item.active{color:#4f6af5;font-weight:600;background:#eef2ff}
    .fab{position:absolute;bottom:80px;right:20px;width:52px;height:52px;border-radius:30px;background:#4f6af5;color:white;font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 18px rgba(79,106,245,0.3);z-index:10;border:none}
    .card{background:white;border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.02)}
    .section-title{font-size:16px;font-weight:650;margin:12px 0 8px;color:#1e293b}
    .stat-row{display:flex;gap:12px;margin:12px 0}
    .stat-item{background:#f1f5f9;border-radius:14px;padding:12px;flex:1;text-align:center;cursor:pointer;transition:0.2s}
    .stat-item:hover{background:#e2e8f0}
    .stat-num{font-size:22px;font-weight:700;color:#1e293b}
    .stat-label{font-size:12px;color:#64748b;margin-top:4px}
    .advice{background:#eef2ff;border-radius:14px;padding:12px 16px;color:#334155;font-size:14px;margin:8px 0}
    .week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
    .week-header button{background:#4f6af5;border:none;color:white;padding:6px 12px;border-radius:20px;font-size:14px;cursor:pointer;white-space:nowrap}
    .week-header .this-week-btn{background:#16a34a}
    .week-grid{display:flex;gap:6px;margin:12px 0}
    .day-cell{flex:1;background:white;border-radius:12px;padding:10px 4px;text-align:center;font-size:13px;border:1px solid #e9ecf2;cursor:pointer;transition:0.2s}
    .day-cell.today{background:#dcfce7;border-color:#86efac}
    .day-name{color:#64748b;margin-bottom:6px}
    .day-num{font-size:18px;font-weight:700;margin:4px 0}
    .day-cell[data-count="0"] .day-num{color:#cbd5e1}
    .day-cell[data-count="1"] .day-num{color:#f59e0b}
    .day-cell[data-count="2"] .day-num{color:#f97316}
    .day-cell[data-count="3"] .day-num{color:#ef4444}
    .day-cell[data-count="4"] .day-num,.day-cell[data-count="5"] .day-num{color:#dc2626;font-size:22px}
    .unscheduled{margin-top:8px;color:#6b7280;font-size:13px}
    .todo-category{margin:16px 0 8px;font-weight:700}
    .todo-row{display:flex;align-items:flex-start;justify-content:space-between;background:white;padding:12px;border-radius:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.02)}
    .todo-info{flex:1}
    .todo-text{font-weight:500;white-space:pre-wrap;word-break:break-word}
    .todo-text a{color:#4f6af5;text-decoration:underline}
    .todo-meta{font-size:12px;color:#64748b;margin-top:3px}
    .prio-high{color:#dc2626;background:#fee2e2;padding:2px 8px;border-radius:12px;font-size:11px;margin-left:6px}
    .prio-mid{color:#d97706;background:#fef3c7;padding:2px 8px;border-radius:12px;font-size:11px;margin-left:6px}
    .prio-low{color:#6b7280;background:#f3f4f6;padding:2px 8px;border-radius:12px;font-size:11px;margin-left:6px}
    .btn-small{border:none;background:#f1f5f9;color:#334155;padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;margin-left:6px}
    .parse-result{background:#f8fafc;border-radius:14px;padding:12px;margin:12px 0}
    .parse-item{display:flex;align-items:flex-start;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e9ecf2}
    .parse-item:last-child{border-bottom:none}
    .parse-item .content-preview{white-space:pre-wrap;word-break:break-word;flex:1}
    .parse-item .item-actions{margin-left:8px;display:flex;align-items:center;gap:4px}
    textarea,input,select{font-family:inherit}
    .btn-primary{background:#4f6af5;color:white;border:none;border-radius:24px;padding:10px 20px;font-weight:600;cursor:pointer}
    hr{border:0.5px solid #e9ecf2;margin:16px 0}
    .reminder-item{display:flex;align-items:center;justify-content:space-between;padding:10px;background:#fff9e6;border-radius:12px;margin-bottom:8px}
    .overdue{background:#fee2e2}
    .reminder-text{font-size:14px}
    .reminder-time{font-size:12px;color:#b45309}
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🧠 TodoAI</h1>
    <span class="date" id="currentDate"></span>
  </div>
  <div class="main-content" id="mainContent"></div>
  <div class="tab-bar" id="tabBar">
    <div class="tab-item active" data-tab="overview">📊 总览</div>
    <div class="tab-item" data-tab="week">📅 周视图</div>
    <div class="tab-item" data-tab="list">📋 清单</div>
    <div class="tab-item" data-tab="add">➕ 添加</div>
    <div class="tab-item" data-tab="remind">⏰ 提醒</div>
  </div>
  <button class="fab" id="fabBtn">+</button>
</div>

<script>
  (function() {
    const STORAGE_KEY = 'todoai_v6_data';
    let state = {
      todos: [],
      completed: [],
      notified: {}
    };

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          state.todos = parsed.todos || [];
          state.completed = parsed.completed || [];
          state.notified = parsed.notified || {};
        } catch(e) {}
      }
    }
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2,6);
    }

    function linkify(text) {
      return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>');
    }
    function tomorrowStr() {
      const d = new Date();
      d.setDate(d.getDate() + 1);
      return d.getFullYear()+'-'+ (d.getMonth()+1).toString().padStart(2,'0')+'-'+ d.getDate().toString().padStart(2,'0');
    }
    function nowStr() {
      return new Date().toISOString();
    }
    function todayStr() {
      return new Date().toISOString().slice(0,10);
    }

    // ---------- 智能解析引擎 ----------
    function parseAdvancedInput(raw) {
      const draftSegments = raw.split(/[。；\n]+/).filter(s => s.trim()).map(s => s.trim());
      const structuredTasks = [];

      draftSegments.forEach(seg => {
        if (/^[✅✔️]/.test(seg) || /^(完成|done)[：: ]/i.test(seg)) return;

        let task = seg;
        let priority = '中';
        let category = null;
        let dueDate = null;
        let timeEstimate = '15m';

        if (/尽快|立刻|马上|紧急|deadline|ddl/i.test(task)) priority = '高';
        else if (/不急|有空|低优先|优先级[较很]?低/.test(task)) priority = '低';

        const now = new Date();
        if (/今天/.test(task)) dueDate = now.toISOString().slice(0,10);
        else if (/明天/.test(task)) dueDate = tomorrowStr();
        else if (/后天/.test(task)) {
          const d = new Date(); d.setDate(d.getDate()+2); dueDate = d.toISOString().slice(0,10);
        } else if (/周(一|二|三|四|五|六|日|天)/.test(task)) {
          const map = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'日':7,'天':7};
          const match = task.match(/周(一|二|三|四|五|六|日|天)/);
          const targetDay = map[match[1]];
          const today = now.getDay() || 7;
          let diff = targetDay - today;
          if (diff <= 0) diff += 7;
          const d = new Date(); d.setDate(d.getDate()+diff); dueDate = d.toISOString().slice(0,10);
        } else if (/周三前/.test(task)) {
          const today = now.getDay() || 7;
          let target = 3;
          let diff = target - today;
          if (diff < 0) diff += 7;
          const d = new Date(); d.setDate(d.getDate()+diff); dueDate = d.toISOString().slice(0,10);
        } else if (/(\d{1,2})月(\d{1,2})[日号]/.test(task)) {
          const match = task.match(/(\d{1,2})月(\d{1,2})[日号]/);
          const month = parseInt(match[1]), day = parseInt(match[2]);
          const year = now.getFullYear();
          const d = new Date(year, month-1, day);
          dueDate = d.toISOString().slice(0,10);
        }

        if (/客户|盘点|跟进|合同|报价|方案|会议|汇报|周报|邮件|电气|人才服务/.test(task)) category = '工作';
        else if (/直播|课程|学习|考试|阅读|书|AI考试|录屏|教程|录播|CSM/.test(task)) category = '学习';
        else if (/龙虾|工具|优化|软件|app|脚本|自动化/.test(task)) category = '工具';
        else if (/运动|健身|跑步|瑜伽|体检|买菜|做饭|打扫/.test(task)) category = '生活';
        else category = '其他';

        if (/盘点|报告|方案|学习|课程/.test(task)) timeEstimate = '45m';
        else if (/直播|录播|录屏/.test(task)) timeEstimate = '30m';
        else if (/跟进|邮件|回复/.test(task)) timeEstimate = '15m';
        else timeEstimate = '15m';

        let content = task
          .replace(/尽快|立刻|马上|紧急|不急|有空|低优先|优先级[较很]?低/g, '')
          .replace(/今天|明天|后天|周[一二三四五六日天]|周三前|下周一/g, '')
          .replace(/\d{1,2}月\d{1,2}[日号]/g, '')
          .replace(/[，,。、\s]+/g, ' ')
          .trim();

        if (!content) content = '未命名任务';

        structuredTasks.push({
          content,
          category,
          priority,
          timeEstimate,
          dueDate: dueDate || tomorrowStr()
        });
      });

      return { draft: draftSegments, structured: structuredTasks };
    }

    function detectCommand(text) {
      const lower = text.trim().toLowerCase();
      if (/^(完成|done)[：: ]/i.test(lower)) {
        const taskHint = text.replace(/^(完成|done)[：: ]*/i, '').trim();
        return { action: 'complete', target: taskHint };
      }
      if (/^(删除|remove|delete)[：: ]/i.test(lower)) {
        const taskHint = text.replace(/^(删除|remove|delete)[：: ]*/i, '').trim();
        return { action: 'delete', target: taskHint };
      }
      if (/^(增加|add|新增)[：: ]/i.test(lower)) {
        const content = text.replace(/^(增加|add|新增)[：: ]*/i, '').trim();
        return { action: 'add', content };
      }
      if (/^(修改|update)[：: ]/i.test(lower)) {
        const parts = text.replace(/^(修改|update)[：: ]*/i, '').split(/为|改成/);
        if (parts.length >= 2) {
          return { action: 'update', old: parts[0].trim(), new: parts[1].trim() };
        }
      }
      return null;
    }

    function executeCommand(cmd) {
      if (cmd.action === 'complete') {
        const found = state.todos.find(t => t.content.includes(cmd.target) || cmd.target.includes(t.content));
        if (found) { completeTodo(found.id); return `✅ 已完成「${found.content}」`; }
        return `⚠️ 未找到匹配的待办：${cmd.target}`;
      }
      if (cmd.action === 'delete') {
        const found = state.todos.find(t => t.content.includes(cmd.target) || cmd.target.includes(t.content));
        if (found) { deleteTodo(found.id); return `🗑 已删除「${found.content}」`; }
        return `⚠️ 未找到匹配的待办：${cmd.target}`;
      }
      if (cmd.action === 'add') {
        addTodosFromParsed([{ content: cmd.content, category: '其他', priority: '中', timeEstimate: '15m', dueDate: tomorrowStr() }]);
        return `➕ 已添加「${cmd.content}」`;
      }
      if (cmd.action === 'update') {
        const found = state.todos.find(t => t.content.includes(cmd.old));
        if (found) { found.content = cmd.new; saveState(); return `✏️ 已修改为「${cmd.new}」`; }
        return `⚠️ 未找到待办：${cmd.old}`;
      }
      return null;
    }

    function addTodosFromParsed(items) {
      items.forEach(item => {
        state.todos.push({
          id: uid(),
          content: item.content,
          category: item.category,
          priority: item.priority,
          timeEstimate: item.timeEstimate,
          dueDate: item.dueDate || tomorrowStr()
        });
      });
      saveState();
    }
    function completeTodo(id) {
      const idx = state.todos.findIndex(t => t.id === id);
      if (idx !== -1) {
        const done = state.todos.splice(idx, 1)[0];
        state.completed.push({ id: done.id, content: done.content, category: done.category, completedAt: nowStr() });
        saveState();
      }
    }
    function deleteTodo(id) {
      state.todos = state.todos.filter(t => t.id !== id);
      saveState();
    }

    // ---------- 提醒系统 ----------
    function requestNotificationPermission() {
      if (window.Notification && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
        Notification.requestPermission();
      }
    }
    function sendNotification(title, body) {
      if (window.Notification && Notification.permission === 'granted') {
        new Notification(title, { body, icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔔</text></svg>' });
      }
    }
    function checkReminders() {
      const now = new Date();
      const soon = new Date(now.getTime() + 30 * 60000);
      state.todos.forEach(task => {
        if (!task.dueDate) return;
        const dueTime = new Date(task.dueDate + 'T23:59:59');
        if (dueTime <= soon && dueTime > now) {
          const lastNotify = state.notified[task.id] ? new Date(state.notified[task.id]) : new Date(0);
          if (now - lastNotify > 5 * 60000) {
            sendNotification('⏰ 任务即将到期', `${task.content} 将在30分钟内到期`);
            state.notified[task.id] = now.toISOString();
            saveState();
          }
        }
        if (dueTime < now) {
          if (!state.notified[task.id+'_overdue']) {
            sendNotification('❗ 任务已过期', `${task.content} 已过截止日期`);
            state.notified[task.id+'_overdue'] = now.toISOString();
            saveState();
          }
        }
      });
    }
    setInterval(checkReminders, 60000);

    // ---------- 界面渲染 ----------
    const main = document.getElementById('mainContent');
    let currentTab = 'overview';
    let weekFilterDate = null;
    let listFilter = null;
    let weekOffset = 0;

    function getWeekDates(offset = 0) {
      const now = new Date();
      const day = now.getDay() || 7;
      const mon = new Date(now);
      mon.setDate(now.getDate() - day + 1 + (offset * 7));
      const week = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(mon);
        d.setDate(mon.getDate() + i);
        week.push(d.toISOString().slice(0,10));
      }
      return week;
    }

    function renderOverview() {
      const total = state.todos.length;
      const today = new Date().toDateString();
      const completedToday = state.completed.filter(c => new Date(c.completedAt).toDateString() === today).length;
      const high = state.todos.filter(t => t.priority === '高').length;
      const cats = {};
      state.todos.forEach(t => cats[t.category] = (cats[t.category]||0)+1);
      const overdue = state.todos.filter(t => t.dueDate && new Date(t.dueDate+'T23:59:59') < new Date()).length;
      const advice = [];
      if (overdue) advice.push(`❗ ${overdue}项任务已过期，请尽快处理。`);
      if (high) advice.push(`⚡ ${high}项高优先级任务。`);
      if (!total) advice.push('🎉 空空如也，去添加任务吧！');

      main.innerHTML = `
        <div class="card">
          <div class="section-title">📊 待办报告</div>
          <div class="stat-row">
            <div class="stat-item" onclick="window.appStatClick('all')"><div class="stat-num">${total}</div><div class="stat-label">剩余</div></div>
            <div class="stat-item" onclick="window.appStatClick('completedToday')"><div class="stat-num">${completedToday}</div><div class="stat-label">今日完成</div></div>
            <div class="stat-item" onclick="window.appStatClick('high')"><div class="stat-num">${high}</div><div class="stat-label">高优先</div></div>
            <div class="stat-item" onclick="window.appStatClick('overdue')"><div class="stat-num" style="color:${overdue?'#dc2626':'#16a34a'}">${overdue}</div><div class="stat-label">已过期</div></div>
          </div>
          <div>${Object.entries(cats).map(([k,v])=>`<span style="background:#eef2ff;border-radius:20px;padding:2px 12px;margin-right:6px;font-size:13px;">${k} ${v}</span>`).join('')}</div>
        </div>
        <div class="advice">💡 ${advice.join(' ')}</div>
        ${state.completed.slice(-3).reverse().map(c=>`<div style="font-size:13px;color:#16a34a;margin:4px 0;">✅ ${c.content.split('\n')[0]}</div>`).join('')}
      `;
    }

    function renderWeekView() {
      const week = getWeekDates(weekOffset);
      const countMap = {}; week.forEach(d => countMap[d] = 0);
      let unscheduled = 0;
      state.todos.forEach(t => {
        if (t.dueDate && countMap.hasOwnProperty(t.dueDate)) countMap[t.dueDate]++;
        else if (!t.dueDate) unscheduled++;
      });
      const names = ['周一','周二','周三','周四','周五','周六','周日'];
      const weekLabel = `${week[0]} ~ ${week[6]}`;
      const today = todayStr();

      let html = `
        <div class="week-header">
          <button onclick="window.appWeekOffset(-1)">◀ 上周</button>
          <button class="this-week-btn" onclick="window.appGoToCurrentWeek()">本周</button>
          <button onclick="window.appWeekOffset(1)">下周 ▶</button>
        </div>
        <div style="text-align:center;font-size:14px;color:#334155;">${weekLabel}</div>
        <div class="week-grid">`;
      week.forEach((d, i) => {
        const c = countMap[d];
        const isToday = (d === today);
        html += `<div class="day-cell${isToday ? ' today' : ''}" data-count="${c}" data-date="${d}" onclick="window.appWeekClick('${d}')">
          <div class="day-name">${names[i]}</div>
          <div class="day-num">${c}</div>
          <div style="font-size:11px;">${d.slice(5)}</div>
        </div>`;
      });
      html += '</div>';
      if (unscheduled) html += `<div class="unscheduled">📌 无截止日期：${unscheduled}项</div>`;
      main.innerHTML = html;
    }

    function renderListView(filterDate = null, extraFilter = null) {
      let list = state.todos;
      if (filterDate) {
        list = list.filter(t => t.dueDate === filterDate);
      }
      if (extraFilter === 'high') {
        list = list.filter(t => t.priority === '高');
      } else if (extraFilter === 'overdue') {
        const now = new Date();
        list = list.filter(t => t.dueDate && new Date(t.dueDate+'T23:59:59') < now);
      } else if (extraFilter === 'completedToday') {
        const today = new Date().toDateString();
        const todayCompleted = state.completed.filter(c => new Date(c.completedAt).toDateString() === today);
        let html = '<div class="section-title">✅ 今日已完成</div>';
        if (todayCompleted.length === 0) html += '<div style="text-align:center;color:#9ca3af;padding:24px;">暂无完成项</div>';
        else {
          todayCompleted.forEach(c => {
            html += `<div class="todo-row"><div class="todo-info"><div class="todo-text">${linkify(c.content)}</div><div class="todo-meta">${c.category} · 已完成</div></div></div>`;
          });
        }
        main.innerHTML = html;
        return;
      }

      const grouped = {};
      list.forEach(t => { if(!grouped[t.category]) grouped[t.category]=[]; grouped[t.category].push(t); });
      let html = filterDate ? `<div style="margin-bottom:8px;">📅 ${filterDate} <button class="btn-small" onclick="window.appClearFilter()">清除</button></div>` : '';
      if (extraFilter === 'high') html += `<div style="margin-bottom:8px;">⚡ 仅显示高优先级 <button class="btn-small" onclick="window.appClearFilter()">清除</button></div>`;
      if (extraFilter === 'overdue') html += `<div style="margin-bottom:8px;">❗ 已过期任务 <button class="btn-small" onclick="window.appClearFilter()">清除</button></div>`;
      if (!list.length) html+='<div style="text-align:center;color:#9ca3af;padding:24px;">✨ 没有待办</div>';
      else {
        for (let cat in grouped) {
          html+=`<div class="todo-category">${cat}</div>`;
          grouped[cat].forEach(t => {
            const prioClass = t.priority==='高'?'prio-high':(t.priority==='低'?'prio-low':'prio-mid');
            html+=`
              <div class="todo-row">
                <div class="todo-info">
                  <div class="todo-text">${linkify(t.content)} <span class="${prioClass}">${t.priority}</span></div>
                  <div class="todo-meta">⏱ ${t.timeEstimate} 📅 ${t.dueDate||'无'}</div>
                </div>
                <div>
                  <button class="btn-small" onclick="window.appComplete('${t.id}')">✅</button>
                  <button class="btn-small" onclick="window.appDelete('${t.id}')">🗑</button>
                </div>
              </div>`;
          });
        }
      }
      main.innerHTML = html;
    }

    function renderAddPage() {
      main.innerHTML = `
        <div class="section-title">➕ 添加待办 · 支持对话指令</div>
        <textarea id="rawInput" rows="6" placeholder="可输入口语化待办，也可输入指令。如：
完成 档案录屏
删除 优化龙虾
增加 今晚买牛奶
修改 开会 为 和客户开视频会
或直接粘贴一大堆待办事项" style="width:100%;padding:12px;border-radius:16px;border:1px solid #e2e8f0;resize:vertical;"></textarea>
        <button class="btn-primary" onclick="window.appProcess()" style="margin-top:8px;">🔍 智能处理</button>
        <div id="processResult" class="parse-result"></div>
        <hr>
        <div style="font-weight:600;margin-bottom:8px;">手动添加</div>
        <input id="manualContent" placeholder="任务内容" style="width:100%;padding:10px;border-radius:14px;border:1px solid #e2e8f0;margin-bottom:8px;">
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <select id="manualCat" style="flex:1;padding:10px;border-radius:14px;"><option>工作</option><option>学习</option><option>生活</option><option>工具</option><option>其他</option></select>
          <select id="manualPrio" style="flex:1;padding:10px;border-radius:14px;"><option value="高">高</option><option value="中" selected>中</option><option value="低">低</option></select>
        </div>
        <input id="manualDue" type="date" style="width:100%;padding:10px;border-radius:14px;border:1px solid #e2e8f0;margin-bottom:8px;">
        <button class="btn-primary" onclick="window.appManualAdd()">📌 添加</button>
      `;
    }

    function renderRemindPage() {
      const now = new Date();
      const soonTasks = state.todos.filter(t => {
        if(!t.dueDate) return false;
        const due = new Date(t.dueDate+'T23:59:59');
        const diff = due - now;
        return diff > 0 && diff < 30*60000;
      });
      const overdueTasks = state.todos.filter(t => {
        if(!t.dueDate) return false;
        return new Date(t.dueDate+'T23:59:59') < now;
      });
      let html = `<div class="section-title">⏰ 提醒中心</div>
      <div class="card">
        <p style="font-size:14px;color:#334155;">📢 提醒说明：<br>
        · 任务到期前30分钟会有浏览器通知<br>
        · 过期任务会显示在下方<br>
        · 请允许浏览器通知权限以获得最佳体验 <button class="btn-small" onclick="window.requestNotify()">开启通知</button></p>
      </div>`;
      if (overdueTasks.length) {
        html += `<div class="section-title" style="color:#dc2626;">❗ 已过期 (${overdueTasks.length})</div>`;
        overdueTasks.forEach(t => {
          html += `<div class="reminder-item overdue">
            <div><span class="reminder-text">${t.content}</span><br><span class="reminder-time">截止：${t.dueDate}</span></div>
            <button class="btn-small" onclick="window.appComplete('${t.id}')">完成</button>
          </div>`;
        });
      }
      if (soonTasks.length) {
        html += `<div class="section-title" style="color:#d97706;">⏳ 即将到期 (${soonTasks.length})</div>`;
        soonTasks.forEach(t => {
          html += `<div class="reminder-item">
            <div><span class="reminder-text">${t.content}</span><br><span class="reminder-time">截止：${t.dueDate}</span></div>
            <button class="btn-small" onclick="window.appComplete('${t.id}')">完成</button>
          </div>`;
        });
      }
      if (!overdueTasks.length && !soonTasks.length) {
        html += '<div style="text-align:center;color:#9ca3af;padding:24px;">✨ 暂时没有需要提醒的任务</div>';
      }
      main.innerHTML = html;
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-item').forEach(el=>el.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      weekFilterDate = null;
      listFilter = null;
      weekOffset = 0; // 重置到本周
      if(tab==='overview') renderOverview();
      else if(tab==='week') renderWeekView();
      else if(tab==='list') renderListView(null, null);
      else if(tab==='add') renderAddPage();
      else if(tab==='remind') renderRemindPage();
    }

    // 全局方法
    window.appStatClick = function(type) {
      switchTab('list');
      if (type === 'all') {
        listFilter = null;
        renderListView(null, null);
      } else if (type === 'high') {
        listFilter = 'high';
        renderListView(null, 'high');
      } else if (type === 'overdue') {
        listFilter = 'overdue';
        renderListView(null, 'overdue');
      } else if (type === 'completedToday') {
        renderListView(null, 'completedToday');
      }
    };

    window.appWeekOffset = function(offset) {
      weekOffset += offset;
      renderWeekView();
    };

    window.appGoToCurrentWeek = function() {
      weekOffset = 0;
      renderWeekView();
    };

    window.appWeekClick = function(date) {
      weekFilterDate = date;
      switchTab('list');
      renderListView(date, null);
    };
    window.appClearFilter = function() {
      weekFilterDate = null;
      listFilter = null;
      renderListView(null, null);
    };
    window.appComplete = function(id) {
      completeTodo(id);
      if (currentTab === 'list') renderListView(weekFilterDate, listFilter);
      else if (currentTab === 'overview') renderOverview();
      else if (currentTab === 'remind') renderRemindPage();
    };
    window.appDelete = function(id) {
      deleteTodo(id);
      if (currentTab === 'list') renderListView(weekFilterDate, listFilter);
      else if (currentTab === 'overview') renderOverview();
      else if (currentTab === 'remind') renderRemindPage();
    };
    window.requestNotify = function() { requestNotificationPermission(); alert('已请求通知权限，如果浏览器提示请允许。'); };

    window.appProcess = function() {
      const raw = document.getElementById('rawInput').value.trim();
      if (!raw) return;
      const resDiv = document.getElementById('processResult');
      const cmd = detectCommand(raw);
      if (cmd) {
        const result = executeCommand(cmd);
        resDiv.innerHTML = `<div>🤖 指令执行结果：<br>${result}</div>`;
        if (currentTab === 'list') renderListView(weekFilterDate, listFilter);
        else if (currentTab === 'overview') renderOverview();
        else if (currentTab === 'remind') renderRemindPage();
        saveState();
        return;
      }
      const parsed = parseAdvancedInput(raw);
      window._parsed = parsed.structured; // 保存引用
      let html = '<div><strong>📝 原始草稿：</strong><br>' + parsed.draft.map((s,i)=>`${i+1}. ${s}`).join('<br>') + '</div>';
      html += '<div style="margin-top:12px;"><strong>📋 结构化清单：</strong></div>';
      parsed.structured.forEach((item, idx) => {
        html += `<div class="parse-item" id="parseItem${idx}">
          <div class="content-preview">${linkify(item.content)}</div>
          <div class="item-actions">
            <span style="font-size:12px;color:#64748b;margin-right:8px;">${item.category} · ${item.priority} · ${item.dueDate||'明天'}</span>
            <button class="btn-small" onclick="window.appRemoveParseItem(${idx})">🗑</button>
          </div>
        </div>`;
      });
      html += '<button class="btn-primary" onclick="window.appConfirmParsed()" style="margin-top:8px;">✅ 确认添加</button>';
      resDiv.innerHTML = html;
    };

    window.appRemoveParseItem = function(index) {
      if (window._parsed && window._parsed.length > index) {
        window._parsed.splice(index, 1);
        const resDiv = document.getElementById('processResult');
        let html = '<div><strong>📝 原始草稿：</strong><br>' + (document.querySelector('#rawInput')?.value.split(/[。；\n]+/).filter(s=>s.trim()).map((s,i)=>`${i+1}. ${s}`).join('<br>') || '') + '</div>';
        html += '<div style="margin-top:12px;"><strong>📋 结构化清单：</strong></div>';
        window._parsed.forEach((item, idx) => {
          html += `<div class="parse-item">
            <div class="content-preview">${linkify(item.content)}</div>
            <div class="item-actions">
              <span style="font-size:12px;color:#64748b;margin-right:8px;">${item.category} · ${item.priority} · ${item.dueDate||'明天'}</span>
              <button class="btn-small" onclick="window.appRemoveParseItem(${idx})">🗑</button>
            </div>
          </div>`;
        });
        html += '<button class="btn-primary" onclick="window.appConfirmParsed()" style="margin-top:8px;">✅ 确认添加</button>';
        resDiv.innerHTML = html;
      }
    };

    window.appConfirmParsed = function() {
      if (window._parsed && window._parsed.length > 0) {
        addTodosFromParsed(window._parsed);
        window._parsed = null;
        document.getElementById('rawInput').value = '';
        document.getElementById('processResult').innerHTML = '<div style="color:#16a34a;">✅ 已全部添加至清单</div>';
        saveState();
      }
    };
    window.appManualAdd = function() {
      const content = document.getElementById('manualContent').value.trim();
      if (!content) return;
      const cat = document.getElementById('manualCat').value;
      const prio = document.getElementById('manualPrio').value;
      const due = document.getElementById('manualDue').value || tomorrowStr();
      addTodosFromParsed([{content, category:cat, priority:prio, timeEstimate:'15m', dueDate:due}]);
      document.getElementById('manualContent').value='';
      alert('已添加');
    };

    // 初始化
    document.getElementById('fabBtn').addEventListener('click', ()=>switchTab('add'));
    document.querySelectorAll('.tab-item').forEach(el=>{
      el.addEventListener('click', ()=> switchTab(el.dataset.tab));
    });
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});
    loadState();
    requestNotificationPermission();
    renderOverview();
  })();
</script>
</body>
</html>
